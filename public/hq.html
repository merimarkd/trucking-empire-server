<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Freight Empire - HQ</title>
  <style>

    html { font-size: 15px; }

      top: 0;
      left: 0;

      height: 100%;

    .ad-placeholder {

    .hq-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .hq-body { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
    .hq-header { background: rgba(13, 17, 23, 0.9); border-bottom: 2px solid rgba(88, 166, 255, 0.3); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2000; }
    .hq-title { text-align: center; flex: 1; font-size: 1.5rem; color: #58a6ff; font-weight: bold; }

    .hq-logout-btn { background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.4); color: #f85149; padding: 5px 12px; border-radius: 2px; cursor: pointer; font-size: 1rem; transition: all 0.2s ease; margin-left: 10px; }
    .hq-logout-btn:hover { background: rgba(248, 81, 73, 0.2); border-color: #f85149; }
    .hq-stats { display: flex; gap: 20px; align-items: center; color: #8b949e; font-size: 1rem; font-family: monospace; }
    .hq-stats::before { content: '|'; color: rgba(88, 166, 255, 0.3); margin-right: 10px; }

    .hq-content { flex: 1; position: relative; overflow: hidden; background: transparent; }
    .hq-animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 50%, rgba(13, 60, 80, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(13, 60, 80, 0.05) 0%, transparent 50%); overflow: hidden; filter: }
    .particle { position: absolute; width: 4px; height: 4px; background: #00d4ff; border-radius: 50%; box-shadow: 0 0 10px #00d4ff, 0 0 20px rgba(0, 212, 255, 0.5); animation: float 20s infinite; }
    .particle::before { content: ''; position: absolute; top: -2px; left: -2px; width: 8px; height: 8px; border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 50%; animation: pulse 3s infinite; }
    @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; } 50% { transform: translate(var(--tx), var(--ty)) scale(1.2); opacity: 1; } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.5); } 50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); } }
    .hq-svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; z-index: 0; }
    .hotspot { cursor: pointer; transition: all 0.2s ease; }

    .department-item:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; color: #58a6ff; }
    .game-window { position: fixed; background: rgba(13, 17, 23, 0.95); border: 2px solid rgba(88, 166, 255, 0.4); border-radius: 4px; display: flex; flex-direction: column; left: 400px; top: 50px; z-index: 1000; }
    .window-header { background: rgba(88, 166, 255, 0.1); border-bottom: 1px solid rgba(88, 166, 255, 0.3); padding: 12px 15px; color: #58a6ff; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
    .window-close { background: rgba(248, 81, 73, 0.2); border: 1px solid rgba(248, 81, 73, 0.4); color: #f85149; padding: 5px 10px; border-radius: 2px; cursor: pointer; font-size: 0.92rem; transition: all 0.2s ease; }
    .window-close:hover { background: rgba(248, 81, 73, 0.3); border-color: #f85149; }

    .npc { animation: npc-bob 3s ease-in-out infinite; }

    .ops-tab:hover { background: rgba(88, 166, 255, 0.15); border-left-color: #58a6ff; }
    .ops-tab.active { background: rgba(88, 166, 255, 0.2); border-left-color: #58a6ff; color: #58a6ff; }
    .ops-content { flex: 1; display: flex; flex-direction: column; }

    .ops-news-container { display: flex; flex-direction: column; height: 100%; }

    .ticker-text { color: #58a6ff; font-size: 1rem; white-space: nowrap; animation: scroll-left 30s linear infinite; }

function createParticleNetwork() {
  const bg = document.querySelector('.hq-animated-bg');
  const canvas = document.createElement('canvas');
  canvas.style.position = 'absolute';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.zIndex = '2';
  bg.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
  
  const particles = [];
  const particleCount = 200;
  
  for (let i = 0; i < particleCount; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3 + 1,
      canConnect: Math.random() < 0.2
    });
  }
  
  function draw() {
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = 'rgba(10, 22, 40, 1.0)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!animationEnabled) {
    requestAnimationFrame(draw);
    return;
   }
    
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(0, 212, 255, 0.5)';
    ctx.shadowBlur = 10;
    
    for (let i = 0; i < particles.length; i++) {
      if (!particles[i].canConnect) continue;
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 250) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    
    requestAnimationFrame(draw);
  }
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
  });
  
  draw();
}

function updateOpsTime() {
  const timezone = stateToTimezone[companyData.hq_state] || 'America/New_York';
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: timezone,
    timeZoneName: 'short'
  });
  const parts = formatter.formatToParts(now);
  const time = parts.filter(p => p.type === 'hour' || p.type === 'literal' || p.type === 'minute').map(p => p.value).join('');
  const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
  const timeEl = document.getElementById('opsTime');
  if (timeEl) {
    timeEl.textContent = time + ' ' + tzName;
  }
}

function initSocket(playerId) {
  const socket = io();

  socket.on('connect', () => {
    console.log('Socket connected');
    socket.emit('player-join', { playerId: playerId });
  });

  socket.on('players-online-count', (data) => {
    document.getElementById('headerPlayersOnline').textContent = 'Players Online: ' + data.count;
  });

  socket.on('disconnect', () => {
    console.log('Socket disconnected');
  });

  // Heartbeat every 60 seconds to keep last_login fresh for AFK detection
  setInterval(() => {
    const token = localStorage.getItem('authToken');
    if (!token) return;
    fetch(API + '/api/game/ping', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(err => console.error('Ping error:', err));
  }, 60 * 1000);
}

function makeResizable(element) {
  const resizer = document.createElement('div');
  resizer.style.cssText = `
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: se-resize;
    background: rgba(88, 166, 255, 0.1);
  `;
  element.style.position = 'fixed';
  element.appendChild(resizer);
  
  let isResizing = false;
  const minWidth = 700;
  const minHeight = 750;
  
  resizer.addEventListener('mousedown', (e) => {
    if (element.dataset.locked === 'true') return;
    isResizing = true;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = element.offsetWidth;
    const startHeight = element.offsetHeight;
    
    const move = (e) => {
      if (!isResizing) return;
      const sidebarWidth = 350;
      const maxWidth = window.innerWidth - sidebarWidth - element.offsetLeft;
      const maxHeight = window.innerHeight - element.offsetTop;
      const newWidth = Math.min(Math.max(minWidth, startWidth + (e.clientX - startX)), maxWidth);
      const newHeight = Math.min(Math.max(minHeight, startHeight + (e.clientY - startY)), maxHeight);
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    };
    
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const rect = element.getBoundingClientRect();
      const minX = sidebarWidth;
      const maxX = window.innerWidth - sidebarWidth - rect.width;
      const minY = 0;
      const maxY = window.innerHeight - rect.height;
      if (rect.left < sidebarWidth || rect.right > window.innerWidth - sidebarWidth) {
        const safeX = Math.min(Math.max(rect.left, minX), maxX);
        const safeY = Math.min(Math.max(rect.top, minY), maxY);
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function makeDraggable(element) {
  const header = element.querySelector('.window-header');
  let offsetX = 0, offsetY = 0;
  header.addEventListener('mousedown', (e) => {
    if (element.dataset.locked === 'true') return;
    const rect = element.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    const move = (e) => {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    };
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const headerHeight = document.querySelector('.hq-header').offsetHeight;
      const rect = element.getBoundingClientRect();
      const overLeft = rect.left < sidebarWidth;
      const overRight = rect.right > window.innerWidth - sidebarWidth;
      const overTop = rect.top < headerHeight;
      const overBottom = rect.bottom > window.innerHeight - 40;
      if (overLeft || overRight || overTop || overBottom) {
        let safeX = rect.left;
        let safeY = rect.top;
        if (overLeft) safeX = sidebarWidth;
        if (overRight) safeX = window.innerWidth - sidebarWidth - rect.width;
        if (overTop) safeY = headerHeight;
        if (overBottom) safeY = window.innerHeight - 40 - rect.height;
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function toggleMinimize(win) {
  const isMinimized = win.classList.contains('win-minimized');
  if (isMinimized) {
    restoreWindow(win);
  } else {
    minimizeWindow(win);
  }
}

function minimizeWindow(win) {
  const taskbar = document.getElementById('minimized-taskbar');
  const current = taskbar.querySelectorAll('.taskbar-item').length;
  if (current >= 15) {
    showGameWindow('Maximum Reached', 'You have reached the maximum of 15 minimized windows. Please restore or close a window before minimizing another.', 'error');
    return;
  }
  win.classList.add('win-minimized');
  win.dataset.preMinLeft = win.style.left;
  win.dataset.preMinTop = win.style.top;
  win.style.left = '-9999px';
  win.style.top = '-9999px';
  const title = win.querySelector('.window-header span') ? win.querySelector('.window-header span').textContent : win.id;
  const item = document.createElement('div');
  item.className = 'taskbar-item';
  item.dataset.winId = win.id;
  item.innerHTML = `<span class="taskbar-item-title">${title}</span><span class="taskbar-item-close" onclick="event.stopPropagation();closeFromTaskbar('${win.id}')">X</span>`;
  item.addEventListener('click', () => restoreWindow(win));
  taskbar.appendChild(item);
  recalcTaskbarWidths();
}

function restoreWindow(win) {
  win.classList.remove('win-minimized');
  win.style.left = win.dataset.preMinLeft || '757px';
  win.style.top = win.dataset.preMinTop || '92px';
  const taskbar = document.getElementById('minimized-taskbar');
  const item = taskbar.querySelector(`[data-win-id="${win.id}"]`);
  if (item) item.remove();
  recalcTaskbarWidths();
}

function closeFromTaskbar(winId) {
  const win = document.getElementById(winId);
  if (win) win.remove();
  const taskbar = document.getElementById('minimized-taskbar');
  const item = taskbar.querySelector(`[data-win-id="${winId}"]`);
  if (item) item.remove();
  recalcTaskbarWidths();
}

function recalcTaskbarWidths() {
  const taskbar = document.getElementById('minimized-taskbar');
  const items = taskbar.querySelectorAll('.taskbar-item');
  if (items.length === 0) return;
  const totalWidth = taskbar.offsetWidth;
  const itemWidth = Math.floor((totalWidth - (items.length * 2)) / items.length);
  items.forEach(item => item.style.width = itemWidth + 'px');

function showWindowMenu(e, win) {
  e.stopPropagation();
  document.querySelectorAll('.win-context-menu').forEach(m => m.remove());
  const locked = win.dataset.locked === 'true';
  const alwaysTop = win.dataset.alwaysTop === 'true';
  const lightBg = win.dataset.lightBg === 'true';
  const menu = document.createElement('div');
  menu.className = 'win-context-menu';
  menu.innerHTML = `
    <div class="win-context-item" onclick="toggleLockWindow(this, event)">
      <span>&#128274;</span> ${locked ? '&#10003; ' : ''}Lock window size and position
    </div>
    <div class="win-context-item" onclick="toggleAlwaysTop(this, event)">
      <span>&#9633;</span> ${alwaysTop ? '&#10003; ' : ''}Enable always above fullscreen views
    </div>
    <div class="win-context-item" onclick="toggleLightBg(this, event)">
      <span>&#9788;</span> ${lightBg ? '&#10003; ' : ''}Enable Light Background
    </div>
    <div class="win-context-divider"></div>
    <div class="win-context-item" onclick="toggleMinimize(this.closest('.game-window') || document.querySelector('.game-window')); document.querySelectorAll('.win-context-menu').forEach(m=>m.remove())">
      <span>&#8661;</span> Collapse
    </div>
  `;
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.dataset.win = win.id;
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 10);
}

function toggleLockWindow(item, e) {
  e.stopPropagation();
  const menu = item.closest('.win-context-menu');
  const win = document.getElementById(menu.dataset.win);
  if (!win) return;
  const locked = win.dataset.locked === 'true';
  win.dataset.locked = !locked;
  if (!locked) {
    win.dataset.savedLeft = win.style.left;
    win.dataset.savedTop = win.style.top;
    win.dataset.savedWidth = win.style.width;
    win.dataset.savedHeight = win.style.height;
    win.style.outline = '1px solid rgba(0,180,220,0.4)';
  } else {
    win.style.outline = '';
  }
  menu.remove();
}

function toggleAlwaysTop(item, e) {
  e.stopPropagation();
  const menu = item.closest('.win-context-menu');
  const win = document.getElementById(menu.dataset.win);
  if (!win) return;
  const alwaysTop = win.dataset.alwaysTop === 'true';
  win.dataset.alwaysTop = !alwaysTop;
  win.style.zIndex = !alwaysTop ? '9000' : '1000';
  menu.remove();
}

function toggleLightBg(item, e) {
  e.stopPropagation();
  const menu = item.closest('.win-context-menu');
  const win = document.getElementById(menu.dataset.win);
  if (!win) return;
  const lightBg = win.dataset.lightBg === 'true';

function updateClock() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: 'UTC',
    timeZoneName: 'short'
  });
  const parts = formatter.formatToParts(now);
  const time = parts.filter(p => p.type === 'hour' || p.type === 'literal' || p.type === 'minute').map(p => p.value).join('');
  const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
  document.getElementById('headerTime').textContent = time + ' ' + tzName;
}

async function submitMarketOrder(orderType) {
  const qty = parseInt(document.getElementById('orderQty').value);
  const price = parseFloat(document.getElementById('orderPrice').value);
  const duration = parseInt(document.getElementById('orderDuration').value);
  if (!qty || qty < 1) { showGameWindow('Invalid Order', 'Quantity must be at least 1.', 'error'); return; }
  if (!price || price <= 0) { showGameWindow('Invalid Order', 'Price must be greater than 0.', 'error'); return; }
  try {
    const res = await fetch(API + '/api/market/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('authToken') },
      body: JSON.stringify({ itemId: selectedMarketItem.id, orderType, quantity: qty, pricePerUnit: price, durationDays: duration })
    });
    const data = await res.json();
    if (!res.ok) { showGameWindow('Order Failed', data.error || 'Could not place order.', 'error'); return; }
    document.getElementById('place-order-window')?.remove();
    showGameWindow('Order Placed', `Your ${orderType} order for ${qty}x ${selectedMarketItem.name} at $${price.toLocaleString()} has been placed.`, 'success');
    loadMarketItem(selectedMarketItem.id, selectedMarketItem.name, selectedMarketItem.category, selectedMarketItem.subcategory, selectedMarketItem.basePrice);
    updateMarketBalance();
  } catch(e) { showGameWindow('Error', 'Network error placing order.', 'error'); }
}

  w.innerHTML = `
    <div class="window-header">
      <span style="color:var(--teal);font-size:0.92rem;letter-spacing:0.08em;">MY MARKET ORDERS</span>
      <div class="window-controls">
        <button class="win-btn" onclick="showWindowMenu(event, this.closest('.game-window'))">&#8942;</button>
        <button class="win-btn win-btn-minimize" onclick="toggleMinimize(this.closest('.game-window'))">&#8211;</button>
        <button class="win-btn win-btn-close" onclick="this.closest('.game-window').remove()">X</button>
      </div>
    </div>
    <div class="window-content">
      <table class="market-orders-table" style="width:100%;">
        <thead><tr><th>Item</th><th>Type</th><th>Qty</th><th>Price</th><th>Expires</th><th>Action</th></tr></thead>
        <tbody id="myOrdersBody"><tr><td colspan="6" class="market-empty">Loading...</td></tr></tbody>
      </table>
    </div>
  `;
  makeDraggable(w);
  makeResizable(w);
  document.body.appendChild(w);
  try {
    const res = await fetch(API + '/api/market/my-orders', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
    });
    const data = await res.json();
    const tbody = document.getElementById('myOrdersBody');
    if (!data.orders.length) { tbody.innerHTML = '<tr><td colspan="6" class="market-empty">No active orders</td></tr>'; return; }
    const formatExpiry = (dt) => {
      const diff = new Date(dt) - new Date();
      const days = Math.floor(diff / 86400000);
      return days + 'd';
    };
    tbody.innerHTML = data.orders.map(o => `
      <tr>
        <td>${o.item_name}</td>
        <td style="color:${o.order_type==='buy'?'#55aa55':'#e05555'}">${o.order_type.toUpperCase()}</td>
        <td>${o.quantity}</td>
        <td>$${parseFloat(o.price_per_unit).toLocaleString()}</td>
        <td>${formatExpiry(o.expires_at)}</td>
        <td><button onclick="cancelMarketOrder('${o.id}')" style="background:rgba(200,64,64,0.1);border:1px solid rgba(200,64,64,0.3);color:var(--danger);font-family:inherit;font-size:0.72rem;padding:3px 8px;cursor:pointer;border-radius:2px;">Cancel</button></td>
      </tr>`).join('');
  } catch(e) {}
}

async function cancelMarketOrder(orderId) {
  try {
    const res = await fetch(API + '/api/market/order/' + orderId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
    });
    if (res.ok) { openMarketOrders(); updateMarketBalance(); }
  } catch(e) {}
}

function openMultibuy() {
  const existing = document.getElementById('multibuy-window');
  if (existing) { existing.remove(); return; }
  const w = document.createElement('div');
  w.id = 'multibuy-window';
  w.className = 'game-window';
  w.style.cssText = 'width:500px;height:350px;left:500px;top:200px;';
  w.innerHTML = `
    <div class="window-header">
      <span style="color:var(--teal);font-size:0.92rem;letter-spacing:0.08em;">MULTIBUY</span>
      <div class="window-controls">
        <button class="win-btn" onclick="showWindowMenu(event, this.closest('.game-window'))">&#8942;</button>
        <button class="win-btn win-btn-minimize" onclick="toggleMinimize(this.closest('.game-window'))">&#8211;</button>
        <button class="win-btn win-btn-close" onclick="this.closest('.game-window').remove()">X</button>
      </div>
    </div>
    <div class="window-content" style="display:flex;flex-direction:column;gap:12px;">
      <div style="color:var(--text-muted);font-size:0.8rem;">Enter items to buy (one per line, format: Item Name, Quantity)</div>
      <textarea id="multibuyInput" style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text-hi);font-family:inherit;font-size:0.8rem;padding:8px;resize:none;border-radius:2px;min-height:150px;" placeholder=""></textarea>
      <button onclick="submitMultibuy()" style="padding:9px;background:rgba(0,180,220,0.15);border:1px solid var(--teal);color:var(--teal);font-family:inherit;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;border-radius:2px;">Process Multibuy</button>
    </div>
  `;
  makeDraggable(w);
  document.body.appendChild(w);
}

function submitMultibuy() {
  showGameWindow('Multibuy', 'Multibuy processing coming soon.', 'success');
}
