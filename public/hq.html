<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Freight Empire - HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 17px; }
    :root {
      --bg:         #0a0c0f;
      --panel:      rgba(8, 12, 18, 0.97);
      --border:     rgba(0, 180, 220, 0.22);
      --border-hi:  rgba(0, 180, 220, 0.55);
      --teal:       #00b4dc;
      --amber:      #e87c2a;
      --text:       #a8b4c0;
      --text-hi:    #d4e0e8;
      --text-muted: #8faaba;
      --danger:     #c84040;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      margin: 0;
      padding: 0;
      font-size: 15px;
    }
    
    .sidebar {
      width: 350px;
      height: 100%;
      flex-shrink: 0;
      background: rgba(8, 12, 18, 0.95);
      border: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }
    .sidebar.left { border-right: 1px solid var(--border); }
    .sidebar.right { border-left: 1px solid var(--border); }
    #bgVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.45;
      pointer-events: none;
    }
    .ad-placeholder {
      background: rgba(0, 180, 220, 0.05);
      border: 1px dashed var(--border);
      padding: 20px;
      margin: 15px 0;
      border-radius: 2px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .hq-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .hq-body { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
    .hq-header { background: rgba(13, 17, 23, 0.9); border-bottom: 2px solid rgba(88, 166, 255, 0.3); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2000; }
    .hq-title { text-align: center; flex: 1; font-size: 1.5rem; color: #58a6ff; font-weight: bold; }
    .hq-dashboard-btn { background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.4); color: #58a6ff; padding: 8px 15px; border-radius: 2px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s ease; }
    .hq-dashboard-btn:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; }
    .anim-toggle { background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.4); color: #58a6ff; padding: 5px 12px; border-radius: 2px; cursor: pointer; font-size: 1rem; transition: all 0.2s ease; margin-left: 10px; z-index: 2000; position: relative; }
    .anim-toggle:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; }
    .anim-toggle.off { opacity: 0.4; color: #8b949e; }
    .hq-logout-btn { background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.4); color: #f85149; padding: 5px 12px; border-radius: 2px; cursor: pointer; font-size: 1rem; transition: all 0.2s ease; margin-left: 10px; }
    .hq-logout-btn:hover { background: rgba(248, 81, 73, 0.2); border-color: #f85149; }
    .hq-stats { display: flex; gap: 20px; align-items: center; color: #8b949e; font-size: 1rem; font-family: monospace; }
    .hq-stats::before { content: '|'; color: rgba(88, 166, 255, 0.3); margin-right: 10px; }
    .hq-time { color: #8b949e; font-size: 1rem; font-family: monospace; }
    .hq-content { flex: 1; position: relative; overflow: hidden; background: transparent; }
    .hq-animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 50%, rgba(13, 60, 80, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(13, 60, 80, 0.05) 0%, transparent 50%); overflow: hidden; filter: }
    .particle { position: absolute; width: 4px; height: 4px; background: #00d4ff; border-radius: 50%; box-shadow: 0 0 10px #00d4ff, 0 0 20px rgba(0, 212, 255, 0.5); animation: float 20s infinite; }
    .particle::before { content: ''; position: absolute; top: -2px; left: -2px; width: 8px; height: 8px; border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 50%; animation: pulse 3s infinite; }
    @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; } 50% { transform: translate(var(--tx), var(--ty)) scale(1.2); opacity: 1; } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.5); } 50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); } }
    .hq-svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; z-index: 0; }
    .hotspot { cursor: pointer; transition: all 0.2s ease; }
    .hotspot:hover { filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.6)); }
    .hotspot-rect { fill: transparent; stroke: transparent; stroke-width: 2; }
    .hotspot:hover .hotspot-rect { stroke: rgba(88, 166, 255, 0.8); }
    .tooltip { position: fixed; background: rgba(13, 17, 23, 0.95); border: 1px solid #58a6ff; color: #58a6ff; padding: 8px 12px; border-radius: 4px; font-size: 1.05rem; pointer-events: none; z-index: 1000; white-space: nowrap; }
    .department-menu { position: fixed; background: rgba(13, 17, 23, 0.95); border: 2px solid rgba(88, 166, 255, 0.5); border-radius: 4px; padding: 20px; min-width: 250px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); z-index: 2000; }
    .department-menu h3 { color: #58a6ff; margin-bottom: 15px; border-bottom: 1px solid rgba(88, 166, 255, 0.3); padding-bottom: 10px; }
    .department-item { padding: 10px; margin: 8px 0; background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); border-radius: 2px; cursor: pointer; transition: all 0.2s ease; color: #c9d1d9; }
    .department-item:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; color: #58a6ff; }
    .game-window { position: fixed; background: rgba(13, 17, 23, 0.95); border: 2px solid rgba(88, 166, 255, 0.4); border-radius: 4px; display: flex; flex-direction: column; left: 400px; top: 50px; z-index: 1000; }
    .window-header { background: rgba(88, 166, 255, 0.1); border-bottom: 1px solid rgba(88, 166, 255, 0.3); padding: 12px 15px; color: #58a6ff; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
    .window-close { background: rgba(248, 81, 73, 0.2); border: 1px solid rgba(248, 81, 73, 0.4); color: #f85149; padding: 5px 10px; border-radius: 2px; cursor: pointer; font-size: 0.92rem; transition: all 0.2s ease; }
    .window-close:hover { background: rgba(248, 81, 73, 0.3); border-color: #f85149; }
    .window-content { flex: 1; padding: 15px; overflow-y: auto; color: #c9d1d9; }
    @keyframes npc-bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    .npc { animation: npc-bob 3s ease-in-out infinite; }
    .npc { animation: npc-bob 3s ease-in-out infinite; }
    .ops-main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .ops-sidebar { width: 180px; background: rgba(13, 17, 23, 0.7); border-right: 1px solid rgba(88, 166, 255, 0.3); overflow-y: auto; height: 100%; }
    .ops-section { padding: 15px 10px; border-bottom: 1px solid rgba(88, 166, 255, 0.2); }
    .ops-section-title { color: #58a6ff; font-size: 0.92rem; font-weight: bold; margin-bottom: 8px; opacity: 0.7; }
    .ops-tab { padding: 8px 10px; margin: 4px 0; background: rgba(88, 166, 255, 0.05); border-left: 2px solid transparent; cursor: pointer; font-size: 1rem; color: #c9d1d9; transition: all 0.2s ease; }
    .ops-tab:hover { background: rgba(88, 166, 255, 0.15); border-left-color: #58a6ff; }
    .ops-tab.active { background: rgba(88, 166, 255, 0.2); border-left-color: #58a6ff; color: #58a6ff; }
    .ops-content { flex: 1; display: flex; flex-direction: column; }
    .ops-header { background: rgba(88, 166, 255, 0.05); border-bottom: 1px solid rgba(88, 166, 255, 0.2); padding: 15px; }
    .ops-company-info { display: flex; justify-content: space-between; align-items: center; }
    .ops-company-name { font-size: 1.2rem; color: #58a6ff; font-weight: bold; }
    .ops-stats { display: flex; gap: 30px; font-size: 1rem; color: #8b949e; }
    .ops-tab-content { flex: 1; padding: 20px; overflow-y: auto; }
    .ops-players-online { font-size: 1.05rem; color: #8b949e; margin-left: 30px; }
    .ops-news-container { display: flex; flex-direction: column; height: 100%; }
    .ops-ticker { background: rgba(88, 166, 255, 0.05); border-bottom: 1px solid rgba(88, 166, 255, 0.2); padding: 10px; overflow: hidden; height: 40px; }
    .ticker-text { color: #58a6ff; font-size: 1rem; white-space: nowrap; animation: scroll-left 30s linear infinite; }
    @keyframes scroll-left { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    .ops-news-tabs { display: flex; gap: 10px; padding: 15px; border-bottom: 1px solid rgba(88, 166, 255, 0.2); }
    .news-tab { background: transparent; border: none; color: #8b949e; cursor: pointer; padding: 5px 15px; border-bottom: 2px solid transparent; transition: all 0.2s ease; font-size: 1rem; }
    .news-tab:hover { color: #58a6ff; }
    .news-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .ops-news-feed { flex: 1; overflow-y: auto; padding: 15px; }
    .news-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(88, 166, 255, 0.1); }
    .news-headline { color: #58a6ff; font-weight: bold; font-size: 1.05rem; margin-bottom: 5px; }
    .news-meta { color: #8b949e; font-size: 0.92rem; margin-bottom: 8px; }
    .news-body { color: #c9d1d9; font-size: 1rem; line-height: 1.4; }
    .market-window { display: flex; flex-direction: column; height: 100%; font-family: 'Courier New', monospace; }
    .market-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); flex-shrink: 0; }
    .market-tabs { display: flex; gap: 0; }
    .market-tab { padding: 5px 14px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: inherit; font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .market-tab.active { background: rgba(0,180,220,0.15); color: var(--teal); border-color: var(--teal); }
    .market-tab:hover { color: var(--teal); border-color: var(--border-hi); }
    .market-search-bar { display: flex; align-items: center; gap: 8px; }
    .market-search-bar input { background: rgba(4,8,14,0.9); border: 1px solid var(--border); color: var(--text-hi); font-family: inherit; font-size: 0.92rem; padding: 5px 10px; width: 200px; border-radius: 2px; outline: none; }
    .market-search-bar input:focus { border-color: var(--border-hi); }
    .market-actions { display: flex; align-items: center; gap: 8px; }
    .market-balance { color: var(--teal); font-size: 0.92rem; cursor: pointer; letter-spacing: 0.05em; border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; }
    .market-balance:hover { border-color: var(--teal); }
    .market-action-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.88rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
    .market-action-btn:hover { border-color: var(--teal); color: var(--teal); }
    .market-body { display: flex; flex: 1; overflow: hidden; }
    .market-left { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: rgba(0,0,0,0.2); }
    .market-category { border-bottom: 1px solid rgba(0,180,220,0.08); }
    .market-category-header { padding: 8px 12px; color: var(--text); font-size: 0.92rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; user-select: none; }
    .market-category-header:hover { background: rgba(0,180,220,0.06); color: var(--teal); }
    .market-category-header.active { color: var(--teal); }
    .market-category-arrow { color: var(--text-muted); font-size: 1.05rem; transition: transform 0.2s; }
    .market-category-arrow.open { transform: rotate(90deg); }
    .market-subcategory { display: none; }
    .market-subcategory.open { display: block; }
    .market-subcat-item { padding: 6px 12px 6px 28px; color: var(--text-muted); font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .market-subcat-item:hover { color: var(--teal); background: rgba(0,180,220,0.05); }
    .market-subcat-item.active { color: var(--teal); background: rgba(0,180,220,0.1); border-left: 2px solid var(--teal); }
    .market-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .market-item-header { padding: 10px 14px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); flex-shrink: 0; }
    .market-breadcrumb { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 4px; }
    .market-item-name { color: var(--text-hi); font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em; }
    .market-item-tabs { display: flex; gap: 0; padding: 0 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .market-item-tab { padding: 6px 16px; color: var(--text-muted); font-size: 0.88rem; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.2s; }
    .market-item-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .market-orders-panel { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .market-orders-section { margin-bottom: 16px; }
    .market-orders-title { color: var(--text-muted); font-size: 1.05rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
    .market-orders-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
    .market-orders-table th { color: var(--text-muted); text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border); font-weight: 400; font-size: 1.05rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
    .market-orders-table th:hover { color: var(--teal); }
    .market-orders-table th { position: relative; user-select: none; white-space: nowrap; }
    .market-orders-table th .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.7rem; }
    .market-orders-table th.sort-asc .sort-arrow::after { content: '▲'; opacity: 1; }
    .market-orders-table th.sort-desc .sort-arrow::after { content: '▼'; opacity: 1; }
    .market-orders-table th .sort-arrow::after { content: '▲▼'; }
    .col-resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 4px; cursor: col-resize; background: transparent; }
    .col-resize-handle:hover { background: rgba(0,180,220,0.3); }
    .market-orders-table td { padding: 5px 8px; border-bottom: 1px solid rgba(0,180,220,0.05); color: var(--text); }
    .market-orders-table tr:hover td { background: rgba(0,180,220,0.04); }
    .market-orders-table .price-sell { color: #e05555; }
    .market-orders-table .price-buy { color: #55aa55; }
    .market-order-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .market-buy-btn { flex: 1; padding: 8px; background: rgba(0,180,220,0.15); border: 1px solid var(--teal); color: var(--teal); font-family: inherit; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
    .market-buy-btn:hover { background: rgba(0,180,220,0.3); }
    .market-sell-btn { flex: 1; padding: 8px; background: rgba(232,124,42,0.15); border: 1px solid var(--amber); color: var(--amber); font-family: inherit; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
    .market-sell-btn:hover { background: rgba(232,124,42,0.3); }
    .market-ticker { height: 28px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); display: flex; align-items: center; overflow: hidden; flex-shrink: 0; padding: 0 8px; }
    .market-ticker-inner { white-space: nowrap; animation: market-scroll 40s linear infinite; font-size: 1.05rem; }
    @keyframes market-scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    .ticker-item { display: inline-block; margin-right: 40px; color: var(--text); }
    .ticker-item .t-name { color: var(--text-muted); margin-right: 6px; }
    .ticker-item .t-price { color: var(--text-hi); margin-right: 4px; }
    .ticker-item .t-up { color: #55aa55; }
    .ticker-item .t-down { color: #e05555; }
    .market-empty { color: var(--text-muted); font-size: 0.92rem; padding: 20px; text-align: center; }
    .market-items-list { padding: 0; }
    .market-item-row { padding: 7px 14px; border-bottom: 1px solid rgba(0,180,220,0.05); color: var(--text-hi); font-size: 0.92rem; cursor: pointer; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .market-item-row:hover { background: rgba(0,180,220,0.06); color: var(--teal); }
    .market-item-row.active { background: rgba(0,180,220,0.1); color: var(--teal); border-left: 2px solid var(--teal); }
    .market-item-price { color: var(--text-muted); font-size: 1.05rem; }
    #freight-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .map-window-wrap { position: relative; width: 100%; height: calc(100% - 44px); overflow: hidden; }
    .map-controls { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }
    .map-control-btn { background: rgba(8,12,18,0.95); border: 1px solid var(--border); color: var(--teal); font-family: inherit; font-size: 0.82rem; padding: 6px 12px; cursor: pointer; border-radius: 2px; text-align: left; transition: background 0.2s; white-space: nowrap; }
    .map-control-btn:hover { background: rgba(0,180,220,0.15); }
    .map-control-btn.active { background: rgba(0,180,220,0.2); border-color: var(--teal); }
    .map-legend { position: absolute; bottom: 30px; left: 10px; z-index: 10; background: rgba(8,12,18,0.9); border: 1px solid var(--border); padding: 10px 14px; font-size: 0.82rem; }
    .map-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; color: var(--text); }
    .map-legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .map-company-popup { font-family: "Courier New", monospace; }
    .mapboxgl-popup-content { background: rgba(8,12,18,0.97) !important; border: 1px solid rgba(0,180,220,0.4) !important; color: var(--text-hi) !important; padding: 12px !important; border-radius: 2px !important; min-width: 180px; }
    .mapboxgl-popup-tip { display: none !important; }
    .map-refresh-indicator { position: absolute; bottom: 10px; right: 10px; z-index: 10; background: rgba(8,12,18,0.8); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; padding: 3px 8px; border-radius: 2px; }
    .ops-sidebar::-webkit-scrollbar { width: 4px; }
    .ops-sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    .ops-sidebar::-webkit-scrollbar-thumb { background: rgba(0,180,220,0.4); border-radius: 2px; }
    .ops-sidebar::-webkit-scrollbar-thumb:hover { background: rgba(0,180,220,0.7); }
    .window-controls { display: flex; align-items: center; gap: 4px; }
    .win-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text-muted); padding: 3px 8px; cursor: pointer; font-size: 0.85rem; border-radius: 2px; transition: all 0.2s; font-family: inherit; line-height: 1; }
    .win-btn:hover { border-color: var(--border-hi); color: var(--text-hi); }
    .win-btn-close { background: rgba(200,64,64,0.2); border-color: rgba(200,64,64,0.4); color: #f85149; }
    .win-btn-close:hover { background: rgba(200,64,64,0.4); border-color: #f85149; }
    .win-btn-minimize { background: rgba(0,180,220,0.1); border-color: rgba(0,180,220,0.3); color: var(--teal); }
    .win-btn-minimize:hover { background: rgba(0,180,220,0.25); border-color: var(--teal); }
    .win-context-menu { position: fixed; background: rgba(8,12,18,0.98); border: 1px solid var(--border); z-index: 99999; min-width: 220px; padding: 4px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .win-context-item { padding: 8px 16px; color: var(--text); font-size: 0.88rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
    .win-context-item:hover { background: rgba(0,180,220,0.1); color: var(--teal); }
    .win-context-divider { border-top: 1px solid var(--border); margin: 4px 0; }
    .win-minimized .window-content, .win-minimized .market-window, .win-minimized .ops-main { display: none !important; }
    .win-minimized { height: auto !important; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }
    .num-input-wrap { position: relative; display: flex; align-items: center; }
    .num-input-wrap input { width: 100%; padding-right: 56px; }
    .num-input-btns { position: absolute; right: 1px; top: 1px; bottom: 1px; display: flex; flex-direction: row; }
    .num-input-btn { width: 26px; background: rgba(0,180,220,0.1); border: none; border-left: 1px solid rgba(0,180,220,0.2); color: var(--teal); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; font-family: inherit; }

function createParticleNetwork() {
  const bg = document.querySelector('.hq-animated-bg');
  const canvas = document.createElement('canvas');
  canvas.style.position = 'absolute';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.zIndex = '2';
  bg.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
  
  const particles = [];
  const particleCount = 200;
  
  for (let i = 0; i < particleCount; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3 + 1,
      canConnect: Math.random() < 0.2
    });
  }
  
  function draw() {
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = 'rgba(10, 22, 40, 1.0)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!animationEnabled) {
    requestAnimationFrame(draw);
    return;
   }
    
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(0, 212, 255, 0.5)';
    ctx.shadowBlur = 10;
    
    for (let i = 0; i < particles.length; i++) {
      if (!particles[i].canConnect) continue;
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 250) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    
    requestAnimationFrame(draw);
  }
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
  });
  
  draw();
}

function updateOpsTime() {
  const timezone = stateToTimezone[companyData.hq_state] || 'America/New_York';
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: timezone,
    timeZoneName: 'short'
  });
  const parts = formatter.formatToParts(now);
  const time = parts.filter(p => p.type === 'hour' || p.type === 'literal' || p.type === 'minute').map(p => p.value).join('');
  const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
  const timeEl = document.getElementById('opsTime');
  if (timeEl) {
    timeEl.textContent = time + ' ' + tzName;
  }
}

function initSocket(playerId) {
  const socket = io();

  socket.on('connect', () => {
    console.log('Socket connected');
    socket.emit('player-join', { playerId: playerId });
  });

  socket.on('players-online-count', (data) => {
    document.getElementById('headerPlayersOnline').textContent = 'Players Online: ' + data.count;
  });

  socket.on('disconnect', () => {
    console.log('Socket disconnected');
  });

  // Heartbeat every 60 seconds to keep last_login fresh for AFK detection
  setInterval(() => {
    const token = localStorage.getItem('authToken');
    if (!token) return;
    fetch(API + '/api/game/ping', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(err => console.error('Ping error:', err));
  }, 60 * 1000);
}

function makeResizable(element) {
  const resizer = document.createElement('div');
  resizer.style.cssText = `
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: se-resize;
    background: rgba(88, 166, 255, 0.1);
  `;
  element.style.position = 'fixed';
  element.appendChild(resizer);
  
  let isResizing = false;
  const minWidth = 700;
  const minHeight = 750;
  
  resizer.addEventListener('mousedown', (e) => {
    if (element.dataset.locked === 'true') return;
    isResizing = true;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = element.offsetWidth;
    const startHeight = element.offsetHeight;
    
    const move = (e) => {
      if (!isResizing) return;
      const sidebarWidth = 350;
      const maxWidth = window.innerWidth - sidebarWidth - element.offsetLeft;
      const maxHeight = window.innerHeight - element.offsetTop;
      const newWidth = Math.min(Math.max(minWidth, startWidth + (e.clientX - startX)), maxWidth);
      const newHeight = Math.min(Math.max(minHeight, startHeight + (e.clientY - startY)), maxHeight);
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    };
    
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const rect = element.getBoundingClientRect();
      const minX = sidebarWidth;
      const maxX = window.innerWidth - sidebarWidth - rect.width;
      const minY = 0;
      const maxY = window.innerHeight - rect.height;
      if (rect.left < sidebarWidth || rect.right > window.innerWidth - sidebarWidth) {
        const safeX = Math.min(Math.max(rect.left, minX), maxX);
        const safeY = Math.min(Math.max(rect.top, minY), maxY);
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function makeDraggable(element) {
  const header = element.querySelector('.window-header');
  let offsetX = 0, offsetY = 0;
  header.addEventListener('mousedown', (e) => {
    if (element.dataset.locked === 'true') return;
    const rect = element.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    const move = (e) => {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    };
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const headerHeight = document.querySelector('.hq-header').offsetHeight;
      const rect = element.getBoundingClientRect();
      const overLeft = rect.left < sidebarWidth;
      const overRight = rect.right > window.innerWidth - sidebarWidth;
      const overTop = rect.top < headerHeight;
      const overBottom = rect.bottom > window.innerHeight - 40;
      if (overLeft || overRight || overTop || overBottom) {
        let safeX = rect.left;
        let safeY = rect.top;
        if (overLeft) safeX = sidebarWidth;
        if (overRight) safeX = window.innerWidth - sidebarWidth - rect.width;
        if (overTop) safeY = headerHeight;
        if (overBottom) safeY = window.innerHeight - 40 - rect.height;
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function toggleMinimize(win) {
  const isMinimized = win.classList.contains('win-minimized');
  if (isMinimized) {
    restoreWindow(win);
  } else {
    minimizeWindow(win);
  }
}

function minimizeWindow(win) {
  const taskbar = document.getElementById('minimized-taskbar');
  const current = taskbar.querySelectorAll('.taskbar-item').length;
  if (current >= 15) {
    showGameWindow('Maximum Reached', 'You have reached the maximum of 15 minimized windows. Please restore or close a window before minimizing another.', 'error');
    return;
  }
  win.classList.add('win-minimized');
  win.dataset.preMinLeft = win.style.left;
  win.dataset.preMinTop = win.style.top;
  win.style.left = '-9999px';
  win.style.top = '-9999px';
  const title = win.querySelector('.window-header span') ? win.querySelector('.window-header span').textContent : win.id;
  const item = document.createElement('div');
  item.className = 'taskbar-item';
  item.dataset.winId = win.id;
  item.innerHTML = `<span class="taskbar-item-title">${title}</span><span class="taskbar-item-close" onclick="event.stopPropagation();closeFromTaskbar('${win.id}')">X</span>`;
  item.addEventListener('click', () => restoreWindow(win));
  taskbar.appendChild(item);
  recalcTaskbarWidths();
}

function restoreWindow(win) {
  win.classList.remove('win-minimized');
  win.style.left = win.dataset.preMinLeft || '757px';
  win.style.top = win.dataset.preMinTop || '92px';
  const taskbar = document.getElementById('minimized-taskbar');
  const item = taskbar.querySelector(`[data-win-id="${win.id}"]`);
  if (item) item.remove();
  recalcTaskbarWidths();
}

function closeFromTaskbar(winId) {
  const win = document.getElementById(winId);
  if (win) win.remove();
  const taskbar = document.getElementById('minimized-taskbar');
  const item = taskbar.querySelector(`[data-win-id="${winId}"]`);
  if (item) item.remove();
  recalcTaskbarWidths();
}

function recalcTaskbarWidths() {
  const taskbar = document.getElementById('minimized-taskbar');
  const items = taskbar.querySelectorAll('.taskbar-item');
  if (items.length === 0) return;
  const totalWidth = taskbar.offsetWidth;
  const itemWidth = Math.floor((totalWidth - (items.length * 2)) / items.length);
  items.forEach(item => item.style.width = itemWidth + 'px');
}
function showWindowMenu(e, win) {
  e.stopPropagation();
  document.querySelectorAll('.win-context-menu').forEach(m => m.remove());
  const locked = win.dataset.locked === 'true';
  const alwaysTop = win.dataset.alwaysTop === 'true';
  const lightBg = win.dataset.lightBg === 'true';

function toggleLockWindow(item, e) {
  e.stopPropagation();
  const menu = item.closest('.win-context-menu');
  const win = document.getElementById(menu.dataset.win);
  if (!win) return;
  const locked = win.dataset.locked === 'true';
  win.dataset.locked = !locked;
  if (!locked) {

          background: #e87c2a;
          border: 2px solid rgba(232,124,42,0.5);

        .setHTML(`

          </div>
        `);
      const marker = new mapboxgl.Marker(el)
        .setLngLat([lng, lat])
        .addTo(freightMap);
      let hoverTimer = null;
      el.addEventListener('mouseenter', () => {
        hoverTimer = setTimeout(() => { popup.setLngLat([lng, lat]).addTo(freightMap); }, 1500);
      });
      el.addEventListener('mouseleave', () => {
        if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
        popup.remove();
      });
      if (!isMyCompany) {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          popup.remove();
          if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
          showCompanyProfileWindow(company);
        });
      }
      mapMarkers.push(marker);
      if (!mapLayers.companies) el.style.display = 'none';
    });
    updateMapRefreshIndicator();
  } catch(e) { console.error('Map companies error:', e); }
}

function updateClock() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: 'UTC',
    timeZoneName: 'short'
  });
  const parts = formatter.formatToParts(now);
  const time = parts.filter(p => p.type === 'hour' || p.type === 'literal' || p.type === 'minute').map(p => p.value).join('');
  const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
  document.getElementById('headerTime').textContent = time + ' ' + tzName;
}

function initMarketTableFeatures() {
  // Column sorting
  document.querySelectorAll('.market-orders-table thead th').forEach((th, i) => {
    th.addEventListener('click', (e) => {
      if (e.target.classList.contains('col-resize-handle')) return;
      const table = th.closest('table');
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const asc = th.classList.contains('sort-asc');
      table.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(asc ? 'sort-desc' : 'sort-asc');
      rows.sort((a, b) => {
        const aVal = a.cells[i]?.textContent.trim() || '';
        const bVal = b.cells[i]?.textContent.trim() || '';
        const aNum = parseFloat(aVal.replace(/[^0-9.-]/g,''));
        const bNum = parseFloat(bVal.replace(/[^0-9.-]/g,''));
        if (!isNaN(aNum) && !isNaN(bNum)) return asc ? bNum - aNum : aNum - bNum;
        return asc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });

  // Column resizing
  document.querySelectorAll('.col-resize-handle').forEach(handle => {
    let startX, startWidth, th;
    handle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      th = handle.parentElement;
      startX = e.clientX;
      startWidth = th.offsetWidth;
      const move = (e) => { th.style.width = Math.max(50, startWidth + e.clientX - startX) + 'px'; };
      const stop = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', stop);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', stop);
    });
  });
}

async function submitMarketOrder(orderType) {
  const qty = parseInt(document.getElementById('orderQty').value);
  const price = parseFloat(document.getElementById('orderPrice').value);
  const duration = parseInt(document.getElementById('orderDuration').value);
  if (!qty || qty < 1) { showGameWindow('Invalid Order', 'Quantity must be at least 1.', 'error'); return; }
  if (!price || price <= 0) { showGameWindow('Invalid Order', 'Price must be greater than 0.', 'error'); return; }
  try {
    const res = await fetch(API + '/api/market/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('authToken') },
      body: JSON.stringify({ itemId: selectedMarketItem.id, orderType, quantity: qty, pricePerUnit: price, durationDays: duration })
    });
    const data = await res.json();
    if (!res.ok) { showGameWindow('Order Failed', data.error || 'Could not place order.', 'error'); return; }
    document.getElementById('place-order-window')?.remove();
    showGameWindow('Order Placed', `Your ${orderType} order for ${qty}x ${selectedMarketItem.name} at $${price.toLocaleString()} has been placed.`, 'success');
    loadMarketItem(selectedMarketItem.id, selectedMarketItem.name, selectedMarketItem.category, selectedMarketItem.subcategory, selectedMarketItem.basePrice);
    updateMarketBalance();
  } catch(e) { showGameWindow('Error', 'Network error placing order.', 'error'); }
}

        <button class="mo-tab" onclick="switchMOTab('orderHistory')" style="padding:8px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:inherit;font-size:0.88rem;cursor:pointer;letter-spacing:0.08em;">Order History</button>
      </div>
      <div id="moContent" style="flex:1;overflow-y:auto;padding:12px;">
        <div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="color:var(--text-hi);font-size:0.92rem;font-weight:700;">Selling</span>
            <input type="text" placeholder="Filter on Type" style="background:var(--input-bg);border:1px solid var(--border);color:var(--text-hi);font-family:inherit;font-size:0.82rem;padding:4px 10px;border-radius:2px;width:200px;" oninput="filterMOTable('sellBody', this.value)">
          </div>
          <table class="market-orders-table" style="width:100%;">
            <thead><tr>
              <th>Item<span class="sort-arrow"></span></th>
              <th>Qty<span class="sort-arrow"></span></th>
              <th>Price/Unit<span class="sort-arrow"></span></th>
              <th>Location<span class="sort-arrow"></span></th>
              <th>Expires<span class="sort-arrow"></span></th>
              <th>Action</th>
            </tr></thead>
            <tbody id="sellBody"><tr><td colspan="6" class="market-empty">Loading...</td></tr></tbody>
          </table>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="color:var(--text-hi);font-size:0.92rem;font-weight:700;">Buying</span>
            <input type="text" placeholder="Filter on Type" style="background:var(--input-bg);border:1px solid var(--border);color:var(--text-hi);font-family:inherit;font-size:0.82rem;padding:4px 10px;border-radius:2px;width:200px;" oninput="filterMOTable('buyBody', this.value)">
          </div>
          <table class="market-orders-table" style="width:100%;">
            <thead><tr>
              <th>Item<span class="sort-arrow"></span></th>
              <th>Qty<span class="sort-arrow"></span></th>
              <th>Price/Unit<span class="sort-arrow"></span></th>
              <th>Min Qty<span class="sort-arrow"></span></th>
              <th>Location<span class="sort-arrow"></span></th>
              <th>Expires<span class="sort-arrow"></span></th>
              <th>Action</th>
            </tr></thead>
            <tbody id="buyBody"><tr><td colspan="7" class="market-empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;font-size:0.82rem;">
        <span style="color:var(--text-muted);">Orders Remaining: <span style="color:var(--text-hi);">15 of 15 max open orders</span></span>
        <span style="color:var(--text-muted);">Ask Range: <span style="color:var(--text-hi);">Limited to businesses</span></span>
        <span style="color:var(--text-muted);">Total in Escrow: <span style="color:var(--text-hi);" id="moEscrow">$0.00</span></span>
        <span style="color:var(--text-muted);">Bid Range: <span style="color:var(--text-hi);">Limited to businesses</span></span>
        <span style="color:var(--text-muted);">Base Broker Fee: <span style="color:var(--text-hi);">3.00% of order value</span></span>
        <span style="color:var(--text-muted);">Modification Range: <span style="color:var(--text-hi);">Limited to businesses</span></span>
        <span style="color:var(--text-muted);">Transaction Tax: <span style="color:var(--text-hi);">State sales tax applies</span></span>
        <span></span>
        <span style="color:var(--text-muted);">Sell Orders Total: <span style="color:#e05555;" id="moSellTotal">$0.00</span></span>
        <span style="color:var(--text-muted);">Buy Orders Total: <span style="color:#55aa55;" id="moBuyTotal">$0.00</span></span>
      </div>
    </div>
  `;
  makeDraggable(w);
  makeResizable(w);
  document.body.appendChild(w);
  loadMyOrders();
}

function switchMOTab(tab) {
  document.querySelectorAll('.mo-tab').forEach(t => {
    t.style.borderBottomColor = 'transparent';
    t.style.color = 'var(--text-muted)';
  });
  event.target.style.borderBottomColor = 'var(--teal)';
  event.target.style.color = 'var(--teal)';
  if (tab === 'myOrders') loadMyOrders();
  else {
    document.getElementById('sellBody').innerHTML = '<tr><td colspan="6" class="market-empty">Order history coming soon</td></tr>';
    document.getElementById('buyBody').innerHTML = '<tr><td colspan="7" class="market-empty">Order history coming soon</td></tr>';
  }
}

function filterMOTable(tbodyId, val) {
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  Array.from(tbody.querySelectorAll('tr')).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(val.toLowerCase()) ? '' : 'none';
  });
}

async function loadMyOrders() {
  try {
    const res = await fetch(API + '/api/market/my-orders', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
    });
    const data = await res.json();
    const formatExpiry = (dt) => {
      const diff = new Date(dt) - new Date();
      const days = Math.floor(diff / 86400000);
      const hrs = Math.floor((diff % 86400000) / 3600000);
      return days + 'd ' + hrs + 'h';
    };
    const sells = data.orders.filter(o => o.order_type === 'sell');
    const buys = data.orders.filter(o => o.order_type === 'buy');
    const sellBody = document.getElementById('sellBody');
    const buyBody = document.getElementById('buyBody');
    if (sellBody) sellBody.innerHTML = sells.length ? sells.map(o => `
      <tr>
        <td>${o.item_name}</td>
        <td>${o.quantity}</td>
        <td class="price-sell">$${parseFloat(o.price_per_unit).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>${o.subcategory || '—'}</td>
        <td>${formatExpiry(o.expires_at)}</td>
        <td><button onclick="cancelMarketOrder('${o.id}')" style="background:rgba(200,64,64,0.1);border:1px solid rgba(200,64,64,0.3);color:var(--danger);font-family:inherit;font-size:0.82rem;padding:3px 8px;cursor:pointer;border-radius:2px;">Cancel</button></td>
      </tr>`).join('') : '<tr><td colspan="6" class="market-empty">No sell orders found</td></tr>';
    if (buyBody) buyBody.innerHTML = buys.length ? buys.map(o => `
      <tr>
        <td>${o.item_name}</td>
        <td>${o.quantity}</td>
        <td class="price-buy">$${parseFloat(o.price_per_unit).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>1</td>
        <td>${o.subcategory || '—'}</td>
        <td>${formatExpiry(o.expires_at)}</td>
        <td><button onclick="cancelMarketOrder('${o.id}')" style="background:rgba(200,64,64,0.1);border:1px solid rgba(200,64,64,0.3);color:var(--danger);font-family:inherit;font-size:0.82rem;padding:3px 8px;cursor:pointer;border-radius:2px;">Cancel</button></td>
      </tr>`).join('') : '<tr><td colspan="7" class="market-empty">No buy orders found</td></tr>';
    const sellTotal = sells.reduce((sum, o) => sum + parseFloat(o.price_per_unit) * o.quantity, 0);
    const buyTotal = buys.reduce((sum, o) => sum + parseFloat(o.price_per_unit) * o.quantity, 0);
    const escrow = buyTotal;
    const remaining = document.getElementById('moEscrow');
    if (remaining) remaining.textContent = '$' + escrow.toLocaleString('en-US',{minimumFractionDigits:2});
    const st = document.getElementById('moSellTotal');
    if (st) st.textContent = '$' + sellTotal.toLocaleString('en-US',{minimumFractionDigits:2});
    const bt = document.getElementById('moBuyTotal');
    if (bt) bt.textContent = '$' + buyTotal.toLocaleString('en-US',{minimumFractionDigits:2});
    const ordersRemaining = document.querySelector('#market-orders-window .mo-remaining');
    const total = data.orders.length;
    if (ordersRemaining) ordersRemaining.textContent = (15 - total) + ' of 15 max open orders';
  } catch(e) { console.error('My orders error:', e); }
}

async function cancelMarketOrder(orderId) {
  try {
    const res = await fetch(API + '/api/market/order/' + orderId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
    });
    if (res.ok) { openMarketOrders(); updateMarketBalance(); }
  } catch(e) {}
}

function openMultibuy() {
  const existing = document.getElementById('multibuy-window');
  if (existing) { existing.remove(); return; }
  const w = document.createElement('div');
  w.id = 'multibuy-window';
  w.className = 'game-window';
  w.style.cssText = 'width:500px;height:350px;left:500px;top:200px;';
  w.innerHTML = `
    <div class="window-header">
      <span style="color:var(--teal);font-size:0.92rem;letter-spacing:0.08em;">MULTIBUY</span>
      <div class="window-controls">
        <button class="win-btn" onclick="showWindowMenu(event, this.closest('.game-window'))">&#8942;</button>
        <button class="win-btn win-btn-minimize" onclick="toggleMinimize(this.closest('.game-window'))">&#8211;</button>
        <button class="win-btn win-btn-close" onclick="this.closest('.game-window').remove()">X</button>
      </div>
    </div>
    <div class="window-content" style="display:flex;flex-direction:column;gap:12px;">
      <div style="color:var(--text-muted);font-size:0.8rem;">Enter items to buy (one per line, format: Item Name, Quantity)</div>
      <textarea id="multibuyInput" style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text-hi);font-family:inherit;font-size:0.8rem;padding:8px;resize:none;border-radius:2px;min-height:150px;" placeholder=""></textarea>
      <button onclick="submitMultibuy()" style="padding:9px;background:rgba(0,180,220,0.15);border:1px solid var(--teal);color:var(--teal);font-family:inherit;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;border-radius:2px;">Process Multibuy</button>
    </div>
  `;
  makeDraggable(w);
  document.body.appendChild(w);
}

function submitMultibuy() {
  showGameWindow('Multibuy', 'Multibuy processing coming soon.', 'success');
}
