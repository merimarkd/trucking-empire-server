<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Freight Empire - HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
    .hq-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
    .hq-header { background: rgba(13, 17, 23, 0.9); border-bottom: 2px solid rgba(88, 166, 255, 0.3); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .hq-title { text-align: center; flex: 1; font-size: 1.5rem; color: #58a6ff; font-weight: bold; }
    .hq-time { color: #8b949e; font-size: 1rem; font-family: monospace; }
    .hq-content { flex: 1; position: relative; overflow: hidden; background: #0d1117; display: flex; align-items: center; justify-content: center; }
    .hq-image { max-width: 100%; max-height: 100%; object-fit: contain; background: #0d1117; }
    .hq-svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; }
    .hotspot { cursor: pointer; transition: all 0.2s ease; }
    .hotspot:hover { filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.6)); }
    .hotspot-rect { fill: transparent; stroke: transparent; stroke-width: 2; }
    .hotspot:hover .hotspot-rect { stroke: rgba(88, 166, 255, 0.8); }
    .tooltip { position: fixed; background: rgba(13, 17, 23, 0.95); border: 1px solid #58a6ff; color: #58a6ff; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; pointer-events: none; z-index: 1000; white-space: nowrap; }
    .department-menu { position: fixed; background: rgba(13, 17, 23, 0.95); border: 2px solid rgba(88, 166, 255, 0.5); border-radius: 4px; padding: 20px; min-width: 250px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); z-index: 2000; }
    .department-menu h3 { color: #58a6ff; margin-bottom: 15px; border-bottom: 1px solid rgba(88, 166, 255, 0.3); padding-bottom: 10px; }
    .department-item { padding: 10px; margin: 8px 0; background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); border-radius: 2px; cursor: pointer; transition: all 0.2s ease; color: #c9d1d9; }
    .department-item:hover { background: rgba(88, 166, 255, 0.2); border-color: #58a6ff; color: #58a6ff; }
    .game-window { position: fixed; background: rgba(13, 17, 23, 0.95); border: 2px solid rgba(88, 166, 255, 0.5); border-radius: 4px; min-width: 400px; min-height: 300px; box-shadow: 0 0 30px rgba(88, 166, 255, 0.3); z-index: 1500; display: flex; flex-direction: column; }
    .window-header { background: rgba(88, 166, 255, 0.1); border-bottom: 1px solid rgba(88, 166, 255, 0.3); padding: 12px 15px; color: #58a6ff; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
    .window-close { background: rgba(248, 81, 73, 0.2); border: 1px solid rgba(248, 81, 73, 0.4); color: #f85149; padding: 5px 10px; border-radius: 2px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s ease; }
    .window-close:hover { background: rgba(248, 81, 73, 0.3); border-color: #f85149; }
    .window-content { flex: 1; padding: 15px; overflow-y: auto; color: #c9d1d9; }
    @keyframes npc-bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    .npc { animation: npc-bob 3s ease-in-out infinite; }
    .npc { animation: npc-bob 3s ease-in-out infinite; }
    .ops-main { display: flex; flex: 1; }
    .ops-sidebar { width: 180px; background: rgba(13, 17, 23, 0.7); border-right: 1px solid rgba(88, 166, 255, 0.3); overflow-y: auto; }
    .ops-section { padding: 15px 10px; border-bottom: 1px solid rgba(88, 166, 255, 0.2); }
    .ops-section-title { color: #58a6ff; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; opacity: 0.7; }
    .ops-tab { padding: 8px 10px; margin: 4px 0; background: rgba(88, 166, 255, 0.05); border-left: 2px solid transparent; cursor: pointer; font-size: 0.9rem; color: #c9d1d9; transition: all 0.2s ease; }
    .ops-tab:hover { background: rgba(88, 166, 255, 0.15); border-left-color: #58a6ff; }
    .ops-tab.active { background: rgba(88, 166, 255, 0.2); border-left-color: #58a6ff; color: #58a6ff; }
    .ops-content { flex: 1; display: flex; flex-direction: column; }
    .ops-header { background: rgba(88, 166, 255, 0.05); border-bottom: 1px solid rgba(88, 166, 255, 0.2); padding: 15px; }
    .ops-company-info { display: flex; justify-content: space-between; align-items: center; }
    .ops-company-name { font-size: 1.2rem; color: #58a6ff; font-weight: bold; }
    .ops-stats { display: flex; gap: 30px; font-size: 0.9rem; color: #8b949e; }
    .ops-tab-content { flex: 1; padding: 20px; overflow-y: auto; }
</style>
  </style>
</head>
<body>
<div class="hq-container">
  <div class="hq-header">
    <div style="width: 200px;"></div>
    <div class="hq-title" id="companyName">Loading...</div>
    <div class="hq-time" id="currentTime">00:00</div>
  </div>
  <div class="hq-content">
    <img id="hqImage" class="hq-image" src="" alt="HQ Office">
    <svg class="hq-svg-overlay" id="hotspotSvg"></svg>
  </div>
</div>
<script>
const API = 'http://143.198.176.234:5000';
let companyData = null;
let playerName = '';

window.addEventListener('load', () => {
  loadHQData();
  updateClock();
  setInterval(updateClock, 1000);
});

async function loadHQData() {
  try {
    const authToken = localStorage.getItem('authToken');
    if (!authToken) {
      window.location.href = '/';
      return;
    }
    
    const playerRes = await fetch(API + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    const player = await playerRes.json();
    
    const companyRes = await fetch(API + '/api/game/hq/' + player.current_company_id);
    companyData = await companyRes.json();
    
    document.getElementById('companyName').textContent = companyData.name;
    document.getElementById('hqImage').src = '/dreamstime_xxl_33475551.jpg';
    
    setupHotspots();
  } catch (error) {
    console.error('Error loading HQ data:', error);
  }
}

function setupHotspots() {
  const svg = document.getElementById('hotspotSvg');
  
  const computerHotspot = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  computerHotspot.classList.add('hotspot');
  computerHotspot.style.cursor = 'pointer';
  computerHotspot.innerHTML = `<rect class="hotspot-rect" x="36.7%" y="37.6%" width="2%" height="3.7%" />`;
  computerHotspot.addEventListener('click', (e) => {
  e.stopPropagation();
  openDepartmentWindow();
});
  svg.appendChild(computerHotspot);
}

function openDepartmentMenu(event) {
  const menu = document.createElement('div');
  menu.classList.add('department-menu');
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
  menu.id = 'departmentMenu';
  
  const departments = [
    { name: 'Dispatch', id: 'dispatch' },
    { name: 'Brokerage', id: 'brokerage' },
    { name: 'Customer Service', id: 'customer-service' },
    { name: 'Safety & DOT', id: 'safety' },
    { name: 'Accounts Payable', id: 'accounting' }
  ];
  
  menu.innerHTML = '<h3>Select Department</h3>';
  departments.forEach(dept => {
    const item = document.createElement('div');
    item.classList.add('department-item');
    item.textContent = dept.name;
    item.addEventListener('click', () => {
      closeDepartmentMenu();
      openDepartmentWindow(dept.name, dept.id);
    });
    menu.appendChild(item);
  });
  
  document.body.appendChild(menu);
  document.addEventListener('click', (e) => {
    if (e.target !== menu && !menu.contains(e.target)) {
      closeDepartmentMenu();
    }
  });
}

function closeDepartmentMenu() {
  const menu = document.getElementById('departmentMenu');
  if (menu) menu.remove();
}

function openDepartmentWindow(departmentName, departmentId) {
  const window = document.createElement('div');
  window.classList.add('game-window');
  window.id = 'operations-center';
  window.style.width = '1200px';
  window.style.height = '700px';
  window.style.left = '50px';
  window.style.top = '50px';
  window.style.display = 'flex';
  window.style.flexDirection = 'column';
  
  window.innerHTML = `
    <div class="window-header">
      <span>COMPANY OPERATIONS CENTER</span>
      <button class="window-close">X</button>
    </div>
    <div class="ops-main">
      <div class="ops-sidebar">
        <div class="ops-section">
          <div class="ops-section-title">ACCOUNTING</div>
          <div class="ops-tab" data-tab="payroll">Payroll</div>
          <div class="ops-tab" data-tab="bank-account">Bank Account</div>
          <div class="ops-tab" data-tab="banking">Banking</div>
        </div>
        <div class="ops-section">
          <div class="ops-section-title">OPERATIONS</div>
          <div class="ops-tab" data-tab="dispatch">Dispatch</div>
          <div class="ops-tab" data-tab="safety">Safety & DOT</div>
          <div class="ops-tab" data-tab="recruiting">Recruiting</div>
          <div class="ops-tab" data-tab="brokerage">Brokerage</div>
        </div>
        <div class="ops-section">
          <div class="ops-section-title">MAINTENANCE</div>
          <div class="ops-tab" data-tab="trucks">Trucks</div>
          <div class="ops-tab" data-tab="trailers">Trailers</div>
        </div>
        <div class="ops-section">
          <div class="ops-tab" data-tab="portal">PORTAL</div>
          <div class="ops-tab" data-tab="auction">AUCTION</div>
          <div class="ops-tab" data-tab="map">MAP</div>
        </div>
      </div>
      <div class="ops-content">
        <div class="ops-header">
          <div class="ops-company-info">
            <div class="ops-company-name" id="opsCompanyName">${companyData.name}</div>
            <div class="ops-stats">
              <span>Time: <span id="opsTime">00:00</span></span>
              <span>Balance: $<span id="opsBalance">0</span></span>
              <span>Drivers: <span id="opsDrivers">0</span> / <span id="opsActiveDrivers">0</span></span>
            </div>
          </div>
        </div>
        <div class="ops-tab-content" id="opsTabContent">
          <p>Select a tab to begin...</p>
        </div>
      </div>
    </div>
  `;
  
  window.querySelector('.window-close').addEventListener('click', () => window.remove());
  
  // Setup tab clicks
  window.querySelectorAll('.ops-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      openTabWindow(e.target.dataset.tab, e.target.textContent);
    });
  });
  
  makeDraggable(window);
  makeResizable(window);
  document.body.appendChild(window);
  
}

function openTabWindow(tabId, tabName) {
  const tabWindow = document.createElement('div');
  tabWindow.classList.add('game-window');
  tabWindow.style.width = '600px';
  tabWindow.style.height = '400px';
  tabWindow.style.left = (Math.random() * 200 + 100) + 'px';
  tabWindow.style.top = (Math.random() * 200 + 100) + 'px';
  
  const tabContents = {
    'payroll': '<p>Payroll Management - Coming Soon</p>',
    'bank-account': '<p>Bank Account - Coming Soon</p>',
    'banking': '<p>Banking & Transactions - Coming Soon</p>',
    'dispatch': '<p>Dispatch Board - Coming Soon</p>',
    'safety': '<p>Safety & DOT Compliance - Coming Soon</p>',
    'recruiting': '<p>Driver Recruiting - Coming Soon</p>',
    'brokerage': '<p>Load Board & Brokerage - Coming Soon</p>',
    'trucks': '<p>Truck Fleet - Coming Soon</p>',
    'trailers': '<p>Trailer Fleet - Coming Soon</p>',
    'portal': '<p>Virtual Market Portal - Coming Soon</p>',
    'auction': '<p>Auction House - Coming Soon</p>',
    'map': '<p>Interactive Map - Coming Soon</p>'
  };
  
  tabWindow.innerHTML = `
    <div class="window-header">
      <span>${tabName}</span>
      <button class="window-close">X</button>
    </div>
    <div class="window-content">
      ${tabContents[tabId] || '<p>Content not found</p>'}
    </div>
  `;
  
  tabWindow.querySelector('.window-close').addEventListener('click', () => tabWindow.remove());
  makeDraggable(tabWindow);
  makeResizable(tabWindow);
  document.body.appendChild(tabWindow);
}

function updateOpsInfo() {
  document.getElementById('opsBalance').textContent = (companyData.cash || 0).toLocaleString();
  document.getElementById('opsDrivers').textContent = '0';
  document.getElementById('opsActiveDrivers').textContent = '0';
}

function makeResizable(element) {
  const resizer = document.createElement('div');
  resizer.style.cssText = `
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: se-resize;
    background: rgba(88, 166, 255, 0.1);
  `;
  element.style.position = 'fixed';
  element.appendChild(resizer);
  
  let isResizing = false;
  const minWidth = 700;
  const minHeight = 750;
  
  resizer.addEventListener('mousedown', (e) => {
    isResizing = true;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = element.offsetWidth;
    const startHeight = element.offsetHeight;
    
    const move = (e) => {
      if (!isResizing) return;
      const newWidth = Math.max(minWidth, startWidth + (e.clientX - startX));
      const newHeight = Math.max(minHeight, startHeight + (e.clientY - startY));
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    };
    
    const stop = () => {
      isResizing = false;
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
    };
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function makeDraggable(element) {
  const header = element.querySelector('.window-header');
  let offsetX = 0, offsetY = 0;
  
  header.addEventListener('mousedown', (e) => {
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    
    const move = (e) => {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    };
    
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
    };
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function showTooltip(event, text) {
  const tooltip = document.getElementById('tooltip');
  tooltip.textContent = text;
  tooltip.style.display = 'block';
  tooltip.style.left = (event.clientX + 10) + 'px';
  tooltip.style.top = (event.clientY + 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function updateClock() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('currentTime').textContent = hours + ':' + minutes;
}
</script>
</body>
</html>
