async function loadHQData() {
  try {
    const authToken = localStorage.getItem('authToken');
    if (!authToken) {
      window.location.href = '/';
      return;
    }
    const playerRes = await fetch(API + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (!playerRes.ok) {
      window.location.href = '/';
      return;
    }
    const player = await playerRes.json();
    if (!player.current_company_id) {
      window.location.href = '/';
      return;
    }
    const companyRes = await fetch(API + '/api/game/hq/' + player.current_company_id, {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (!companyRes.ok) {
      window.location.href = '/';
      return;
    }
    companyData = await companyRes.json();
    document.getElementById('headerUsername').textContent = player.username || '';
    initSocket(player.id);
    setupHotspots();
    // createParticleNetwork(); // Disabled - using video background instead
  } catch (error) {
    console.error('Error loading HQ data:', error);
    window.location.href = '/';
  }
}

      openDepartmentWindow(dept.name, dept.id);

  document.addEventListener('click', (e) => {

      closeDepartmentMenu();
    }
  });
}

function closeDepartmentMenu() {

function createParticleNetwork() {
  const bg = document.querySelector('.hq-animated-bg');
  const canvas = document.createElement('canvas');
  canvas.style.position = 'absolute';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.zIndex = '2';
  bg.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
  
  const particles = [];
  const particleCount = 200;
  
  for (let i = 0; i < particleCount; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3 + 1,
      canConnect: Math.random() < 0.2
    });
  }
  
  function draw() {
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = 'rgba(10, 22, 40, 1.0)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!animationEnabled) {
    requestAnimationFrame(draw);
    return;
   }
    
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(0, 212, 255, 0.5)';
    ctx.shadowBlur = 10;
    
    for (let i = 0; i < particles.length; i++) {
      if (!particles[i].canConnect) continue;
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 250) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    
    requestAnimationFrame(draw);
  }
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
  });
  
  draw();
}

function toggleAnimation() {

}

async function loadCompanyStats() {
  try {
    const response = await fetch(API + '/api/game/company-stats/' + companyData.id);
    const stats = await response.json();
    
    document.getElementById('opsBalance').textContent = stats.cash.toLocaleString();
    document.getElementById('opsDrivers').textContent = stats.totalDrivers;
    document.getElementById('opsActiveDrivers').textContent = stats.activeDrivers;
  } catch (error) {

function updateOpsTime() {
  const timezone = stateToTimezone[companyData.hq_state] || 'America/New_York';
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: timezone,
    timeZoneName: 'short'
  });
  const parts = formatter.formatToParts(now);
  const time = parts.filter(p => p.type === 'hour' || p.type === 'literal' || p.type === 'minute').map(p => p.value).join('');
  const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
  const timeEl = document.getElementById('opsTime');
  if (timeEl) {
    timeEl.textContent = time + ' ' + tzName;
  }
}

function initSocket(playerId) {
  const socket = io();

  socket.on('connect', () => {
    console.log('Socket connected');
    socket.emit('player-join', { playerId: playerId });
  });

  socket.on('players-online-count', (data) => {
    document.getElementById('headerPlayersOnline').textContent = 'Players Online: ' + data.count;
  });

  socket.on('disconnect', () => {
    console.log('Socket disconnected');
  });

  // Heartbeat every 60 seconds to keep last_login fresh for AFK detection
  setInterval(() => {
    const token = localStorage.getItem('authToken');
    if (!token) return;
    fetch(API + '/api/game/ping', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(err => console.error('Ping error:', err));
  }, 60 * 1000);
}

function makeResizable(element) {
  const resizer = document.createElement('div');
  resizer.style.cssText = `
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: se-resize;
    background: rgba(88, 166, 255, 0.1);
  `;
  element.style.position = 'fixed';
  element.appendChild(resizer);
  
  let isResizing = false;
  const minWidth = 700;
  const minHeight = 750;
  
  resizer.addEventListener('mousedown', (e) => {
    isResizing = true;
    const startX = e.clientX;
    const startY = e.clientY;
    const startWidth = element.offsetWidth;
    const startHeight = element.offsetHeight;
    
    const move = (e) => {
      if (!isResizing) return;
      const sidebarWidth = 350;
      const maxWidth = window.innerWidth - sidebarWidth - element.offsetLeft;
      const maxHeight = window.innerHeight - element.offsetTop;
      const newWidth = Math.min(Math.max(minWidth, startWidth + (e.clientX - startX)), maxWidth);
      const newHeight = Math.min(Math.max(minHeight, startHeight + (e.clientY - startY)), maxHeight);
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    };
    
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const rect = element.getBoundingClientRect();
      const minX = sidebarWidth;
      const maxX = window.innerWidth - sidebarWidth - rect.width;
      const minY = 0;
      const maxY = window.innerHeight - rect.height;
      if (rect.left < sidebarWidth || rect.right > window.innerWidth - sidebarWidth) {
        const safeX = Math.min(Math.max(rect.left, minX), maxX);
        const safeY = Math.min(Math.max(rect.top, minY), maxY);
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}

function makeDraggable(element) {
  const header = element.querySelector('.window-header');
  let offsetX = 0, offsetY = 0;
  header.addEventListener('mousedown', (e) => {
    const rect = element.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    const move = (e) => {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    };
    const stop = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', stop);
      const sidebarWidth = 350;
      const rect = element.getBoundingClientRect();
      const overLeft = rect.left < sidebarWidth;
      const overRight = rect.right > window.innerWidth - sidebarWidth;
      if (overLeft || overRight) {
        let safeX;
        if (overLeft) {
          safeX = sidebarWidth;
        } else {
          safeX = window.innerWidth - sidebarWidth - rect.width;
        }
        const safeY = Math.min(Math.max(rect.top, 0), window.innerHeight - rect.height);
        element.style.transition = 'left 0.2s, top 0.2s';
        element.style.left = safeX + 'px';
        element.style.top = safeY + 'px';
        setTimeout(() => element.style.transition = '', 200);
      }
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
  });
}
