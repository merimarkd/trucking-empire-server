<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Freight Empire - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial; background: #0d1117; color: #c9d1d9; padding: 20px; }
    .container { max-width: 1600px; margin: 0 auto; }
    h1 { color: #58a6ff; margin-bottom: 30px; }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(88,166,255,0.2); margin-bottom: 30px; }
    .tab { padding: 12px 20px; cursor: pointer; color: #8b949e; border: none; background: none; font-size: 1rem; }
    .tab.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 40px; }
    .stat-card { background: rgba(31, 111, 235, 0.1); border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 8px; padding: 20px; }
    .stat-number { font-size: 2.5rem; color: #58a6ff; font-weight: bold; }
    .stat-label { color: #8b949e; margin-top: 8px; font-size: 0.9rem; }
    .search { margin-bottom: 20px; }
    .search input { padding: 10px 15px; background: rgba(88, 166, 255, 0.05); border: 1px solid rgba(88, 166, 255, 0.2); color: #c9d1d9; border-radius: 6px; width: 300px; }
    table { width: 100%; border-collapse: collapse; background: rgba(13, 17, 23, 0.5); border: 1px solid rgba(88, 166, 255, 0.1); }
    th { background: rgba(88, 166, 255, 0.1); padding: 12px; text-align: left; border-bottom: 1px solid rgba(88, 166, 255, 0.2); color: #58a6ff; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid rgba(88, 166, 255, 0.1); }
    tr:hover { background: rgba(88, 166, 255, 0.05); }
    .loading { color: #8b949e; font-style: italic; }
  </style>
</head>
<body>
<div class="container">
  <h1>FREIGHT EMPIRE - Admin Panel</h1>
  
  <div class="tabs">
  <button class="tab active" onclick="switchTab(event, 'overview')">Overview</button>
  <button class="tab" onclick="switchTab(event, 'companies')">Companies</button>
  <button class="tab" onclick="switchTab(event, 'players')">Players</button>
  <button class="tab" onclick="switchTab(event, 'deleted')">Deleted Players</button>
  </div>

  <!-- OVERVIEW -->
  <div class="tab-content active" id="overview">
    <div class="stats" id="statsContainer">
      <div class="stat-card"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- COMPANIES -->
  <div class="tab-content" id="companies">
    <div class="search">
      <input type="text" id="companySearch" placeholder="Search company name..." onkeyup="filterCompanies()">
    </div>
    <table>
      <thead>
        <tr>
          <th>Company Name</th>
          <th>Owner ID</th>
          <th>Trucks</th>
          <th>Drivers</th>
          <th>Active Loans</th>
          <th>Cash</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="companiesTable">
        <tr><td colspan="7" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- PLAYERS -->
  <div class="tab-content" id="players">
    <div class="search">
      <input type="text" id="playerSearch" placeholder="Search username or email..." onkeyup="filterPlayers()">
    </div>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Credit Score</th>
          <th>Current Company</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="playersTable">
        <tr><td colspan="5" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
  
   <!-- PLAYERS -->
  <div class="tab-content" id="players">
    <div class="search">
      <input type="text" id="playerSearch" placeholder="Search username or email..." onkeyup="filterPlayers()">
    </div>
    <table>
      ...table content...
    </table>
  </div>

  <!-- DELETED PLAYERS --> 
  <div class="tab-content" id="deleted">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Reason</th>
          <th>Deleted</th>
          <th>Purge Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="deletedTable">
        <tr><td colspan="6" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>   

<script>
  const API = 'http://143.198.176.234:5000';
  let allCompanies = [];
  let allPlayers = [];

  window.addEventListener('load', () => {
  loadStats();
  loadCompanies();
  loadPlayers();
  loadDeletedPlayers();
});

  function switchTab(e, tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    e.target.classList.add('active');
  }

  async function loadStats() {
    try {
      const res = await fetch(API + '/api/game/admin/stats');
      const stats = await res.json();
      const html = `
        <div class="stat-card">
          <div class="stat-number">${stats.totalPlayers}</div>
          <div class="stat-label">Total Players</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.totalCompanies}</div>
          <div class="stat-label">Total Companies</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">$${parseFloat(stats.totalCash).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
          <div class="stat-label">Total Cash</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${Math.round(stats.avgCreditScore)}</div>
          <div class="stat-label">Avg Credit Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.activeLoans}</div>
          <div class="stat-label">Active Loans</div>
        </div>
      `;
      document.getElementById('statsContainer').innerHTML = html;
    } catch (e) {
      console.error(e);
    }
  }

  async function loadCompanies() {
    try {
      const res = await fetch(API + '/api/game/admin/companies');
      allCompanies = await res.json();
      renderCompanies(allCompanies);
    } catch (e) {
      console.error(e);
    }
  }

  async function loadPlayers() {
    try {
      const res = await fetch(API + '/api/auth/admin/players');
      allPlayers = await res.json();
      renderPlayers(allPlayers);
    } catch (e) {
      console.error(e);
    }
  }

  async function loadDeletedPlayers() {
    try {
      const res = await fetch(API + '/api/game/admin/deleted-players');
      const deletedPlayers = await res.json();
      renderDeletedPlayers(deletedPlayers);
    } catch (e) {
      console.error(e);
    }
  }

  function filterCompanies() {
    const query = document.getElementById('companySearch').value.toLowerCase();
    const filtered = allCompanies.filter(c => c.name.toLowerCase().includes(query));
    renderCompanies(filtered);
  }

  function filterPlayers() {
    const query = document.getElementById('playerSearch').value.toLowerCase();
    const filtered = allPlayers.filter(p => 
      p.username.toLowerCase().includes(query) || 
      p.email.toLowerCase().includes(query)
    );
    renderPlayers(filtered);
  }

  function renderCompanies(companies) {
  const html = companies.map(c => `
    <tr>
      <td><a href="#" onclick="viewCompany('${c.id}'); return false;" style="color: #58a6ff; text-decoration: none; cursor: pointer;">${c.name}</a></td>
      <td>${c.owner_id ? c.owner_id.substring(0, 8) : 'Orphaned'}</td>
      <td>${c.truck_count}</td>
      <td>${c.driver_count}</td>
      <td>${c.active_loans}</td>
      <td>$${parseFloat(c.cash).toLocaleString()}</td>
      <td>${new Date(c.created_at).toLocaleDateString()}</td>
      <td><button onclick="deleteCompany('${c.id}')" style="padding: 5px 10px; background: rgba(255, 0, 0, 0.1); color: #f85149; border: 1px solid rgba(255, 0, 0, 0.3); font-size: 0.8rem;">Delete</button></td>
    </tr>
  `).join('');
  document.getElementById('companiesTable').innerHTML = html || '<tr><td colspan="8">No companies found</td></tr>';
}

  function renderPlayers(players) {
    const html = players.map(p => `
      <tr>
        <td>${p.username}</td>
        <td>${p.email}</td>
        <td>${p.personal_credit_score}</td>
        <td>${p.company_name ? p.company_name + ' (' + p.current_company_id.substring(0, 8) + ')' : 'None'}</td>
        <td>${new Date(p.created_at).toLocaleDateString()}</td>
        <td><button onclick="deletePlayer('${p.id}', '${p.username}')" style="padding: 5px 10px; background: rgba(255, 0, 0, 0.1); color: #f85149; border: 1px solid rgba(255, 0, 0, 0.3); font-size: 0.8rem;">Delete</button></td>
      </tr>
    `).join('');
    document.getElementById('playersTable').innerHTML = html || '<tr><td colspan="5">No players found</td></tr>';
  }

   function renderDeletedPlayers(players) {
  const html = players.map(p => `
    <tr>
      <td>${p.username}</td>
      <td>${p.email}</td>
      <td>${p.deletion_reason}</td>
      <td>${new Date(p.deleted_at).toLocaleDateString()}</td>
      <td>${new Date(p.auto_purge_at).toLocaleDateString()}</td>
      <td><button onclick="viewDeletedPlayer('${p.id}', '${p.username}')" style="padding: 5px 10px; background: rgba(88, 166, 255, 0.1); color: #58a6ff; border: 1px solid rgba(88, 166, 255, 0.3); font-size: 0.8rem; cursor: pointer; border-radius: 2px;">View</button></td>
    </tr>
  `).join('');
  document.getElementById('deletedTable').innerHTML = html || '<tr><td colspan="6">No deleted players</td></tr>';
}

function viewDeletedPlayer(id, username) {
  openDeletedPlayerModal(id, username);
}

function openDeletedPlayerModal(playerId, username) {
  const modal = document.createElement('div');
  modal.id = 'viewDeletedPlayerModal';
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  `;
  
  modal.innerHTML = `
    <div style="
      background: #0d1117;
      border: 2px solid #58a6ff;
      border-radius: 4px;
      padding: 30px;
      width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    ">
      <h2 style="color: #58a6ff; margin: 0 0 20px 0; font-size: 1.4rem;">Deleted Player Profile</h2>
      <div id="deletedPlayerContent" style="color: #c9d1d9; line-height: 1.8;">
        <div class="loading">Loading...</div>
      </div>
      <button onclick="closeDeletedPlayerModal()" style="
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        background: rgba(88, 166, 255, 0.1);
        color: #58a6ff;
        border: 1px solid rgba(88, 166, 255, 0.3);
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      ">Close</button>
    </div>
  `;
  
  document.body.appendChild(modal);
  modal.onclick = (e) => {
    if (e.target === modal) closeDeletedPlayerModal();
  };
  
  loadDeletedPlayerDetails(playerId);
}

function closeDeletedPlayerModal() {
  const modal = document.getElementById('viewDeletedPlayerModal');
  if (modal) modal.remove();
}

async function loadDeletedPlayerDetails(playerId) {
  try {
    const res = await fetch(API + '/api/game/admin/deleted-players/' + playerId);
    const data = await res.json();
    
    if (res.ok) {
      const player = data.player;
      const html = `
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(88, 166, 255, 0.1); border-left: 3px solid #58a6ff; border-radius: 2px;">
          <strong>Username:</strong> ${player.username}<br>
          <strong>Email:</strong> ${player.email}
        </div>
        <div style="margin-bottom: 15px;">
          <strong>Credit Score:</strong> ${player.personal_credit_score}<br>
          <strong>Account Created:</strong> ${new Date(player.created_at).toLocaleString()}<br>
          <strong>Deletion Reason:</strong> <span style="color: #f85149;">${player.deletion_reason}</span><br>
          <strong>Deleted:</strong> ${new Date(player.deleted_at).toLocaleString()}<br>
          <strong>Auto-Purge:</strong> ${new Date(player.auto_purge_at).toLocaleString()}
        </div>
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(248, 81, 73, 0.1); border-radius: 2px; border-left: 3px solid #f85149;">
          <strong>Admin Notes:</strong><br>
          ${player.deletion_notes || '<em style="opacity: 0.6;">None</em>'}
        </div>
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(88, 166, 255, 0.05); border-radius: 2px;">
          <strong>Orphaned Companies:</strong><br>
          ${data.orphanedCompanies && data.orphanedCompanies.length > 0 
            ? data.orphanedCompanies.map(c => `<div style="margin-top: 8px;"><a href="#" onclick="viewCompany('${c.id}'); return false;" style="color: #58a6ff; text-decoration: none; cursor: pointer;">${c.name}</a> <span style="opacity: 0.6;">(${c.id.substring(0, 8)})</span></div>`).join('')
            : '<em style="opacity: 0.6;">None</em>'}
        </div>
      `;
      document.getElementById('deletedPlayerContent').innerHTML = html;
    } else {
      document.getElementById('deletedPlayerContent').innerHTML = '<span style="color: #f85149;">Error loading player details: ' + data.error + '</span>';
    }
  } catch (error) {
    console.error(error);
    document.getElementById('deletedPlayerContent').innerHTML = '<span style="color: #f85149;">Error: ' + error.message + '</span>';
  }
}

async function deleteCompany(companyId) {
  if (!confirm('Delete this company and put it up for auction at 50% value?')) {
    return;
  }
  
  try {
    const res = await fetch(API + '/api/game/admin/delete-company', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ companyId })
    });
    
    if (res.ok) {
      alert('Company deleted!');
      loadCompanies();
    } else {
      alert('Error deleting company');
    }
  } catch (error) {
    console.error(error);
  }
}

async function deletePlayer(playerId, username) {
  openDeletePlayerModal(playerId, username);
}

function openDeletePlayerModal(playerId, username) {
  const modal = document.createElement('div');
  modal.id = 'deletePlayerModal';
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  `;
  
  modal.innerHTML = `
    <div style="
      background: #0d1117;
      border: 2px solid #58a6ff;
      border-radius: 4px;
      padding: 30px;
      width: 400px;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    ">
      <h2 style="color: #58a6ff; margin: 0 0 20px 0; font-size: 1.4rem;">Delete Player</h2>
      <p style="color: #c9d1d9; margin-bottom: 20px;">Are you sure you want to delete <strong>${username}</strong>?</p>
      
      <div style="margin-bottom: 15px;">
        <label style="color: #c9d1d9; display: block; margin-bottom: 5px; font-weight: bold;">Reason:</label>
        <select id="deleteReason" style="
          width: 100%;
          padding: 8px;
          background: #161b22;
          color: #c9d1d9;
          border: 1px solid rgba(88, 166, 255, 0.3);
          border-radius: 4px;
        ">
          <option value="">-- Select Reason --</option>
          <option value="inactivity">Inactivity (30+ days)</option>
          <option value="violation">Policy Violation</option>
          <option value="fraud">Fraud/Exploit</option>
          <option value="request">Player Request</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div style="margin-bottom: 20px;">
        <label style="color: #c9d1d9; display: block; margin-bottom: 5px; font-weight: bold;">Notes (optional):</label>
        <textarea id="deleteNotes" placeholder="Admin notes..." style="
          width: 100%;
          padding: 8px;
          background: #161b22;
          color: #c9d1d9;
          border: 1px solid rgba(88, 166, 255, 0.3);
          border-radius: 4px;
          font-family: monospace;
          font-size: 0.9rem;
          resize: vertical;
          height: 80px;
          box-sizing: border-box;
        "></textarea>
      </div>
      
      <div style="display: flex; gap: 10px;">
        <button onclick="confirmDeletePlayer('${playerId}')" style="
          flex: 1;
          padding: 10px;
          background: rgba(248, 81, 73, 0.2);
          color: #f85149;
          border: 1px solid rgba(248, 81, 73, 0.4);
          border-radius: 4px;
          cursor: pointer;
          font-weight: bold;
          font-size: 0.9rem;
        ">Confirm Delete</button>
        <button onclick="closeDeletePlayerModal()" style="
          flex: 1;
          padding: 10px;
          background: rgba(88, 166, 255, 0.1);
          color: #58a6ff;
          border: 1px solid rgba(88, 166, 255, 0.3);
          border-radius: 4px;
          cursor: pointer;
          font-weight: bold;
          font-size: 0.9rem;
        ">Cancel</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  modal.onclick = (e) => {
    if (e.target === modal) closeDeletePlayerModal();
  };
}

function closeDeletePlayerModal() {
  const modal = document.getElementById('deletePlayerModal');
  if (modal) modal.remove();
}

async function confirmDeletePlayer(playerId) {
  const reason = document.getElementById('deleteReason').value;
  const notes = document.getElementById('deleteNotes').value;
  
  if (!reason) {
    alert('Please select a reason');
    return;
  }
  
  closeDeletePlayerModal();
  
  try {
    const res = await fetch(API + '/api/game/admin/delete-player', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playerId, reason, notes })
    });

    if (res.ok) {
      const msg = document.createElement('div');
      msg.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(88, 166, 255, 0.2);
        border: 1px solid #58a6ff;
        color: #58a6ff;
        padding: 15px 20px;
        border-radius: 4px;
        z-index: 10001;
      `;
      msg.textContent = '✓ Player deleted, companies auctioned, email banned';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
      loadPlayers();
      loadDeletedPlayers();
      loadCompanies();
      loadStats();
    } else {
      const error = await res.json();
      alert('Error: ' + error.error);
    }
  } catch (error) {
    console.error(error);
    alert('Error deleting player: ' + error.message);
  }
}

function viewCompany(companyId) {
  openCompanyModal(companyId);
}

function openCompanyModal(companyId) {
  const modal = document.createElement('div');
  modal.id = 'viewCompanyModal';
  modal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  `;
  
  modal.innerHTML = `
    <div style="
      background: #0d1117;
      border: 2px solid #58a6ff;
      border-radius: 4px;
      padding: 30px;
      width: 550px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    ">
      <h2 style="color: #58a6ff; margin: 0 0 20px 0; font-size: 1.4rem;">Company Details</h2>
      <div id="companyContent" style="color: #c9d1d9; line-height: 1.8;">
        <div class="loading">Loading...</div>
      </div>
      <button onclick="closeCompanyModal()" style="
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        background: rgba(88, 166, 255, 0.1);
        color: #58a6ff;
        border: 1px solid rgba(88, 166, 255, 0.3);
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      ">Close</button>
    </div>
  `;
  
  document.body.appendChild(modal);
  modal.onclick = (e) => {
    if (e.target === modal) closeCompanyModal();
  };
  
  loadCompanyDetails(companyId);
}

function closeCompanyModal() {
  const modal = document.getElementById('viewCompanyModal');
  if (modal) modal.remove();
}

async function loadCompanyDetails(companyId) {
  try {
    const res = await fetch(API + '/api/game/admin/company/' + companyId);
    const data = await res.json();
    
    if (res.ok) {
      const c = data.company;
      const html = `
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(88, 166, 255, 0.1); border-left: 3px solid #58a6ff; border-radius: 2px;">
          <strong>Company Name:</strong> ${c.name}<br>
          <strong>Owner:</strong> ${c.owner_name || 'Orphaned'}<br>
          <strong>Company ID:</strong> ${c.id}
        </div>
        <div style="margin-bottom: 15px;">
          <strong>DOT Number:</strong> ${c.dot_number}<br>
          <strong>MC Number:</strong> ${c.mc_number}<br>
          <strong>Cash:</strong> $${parseFloat(c.cash).toLocaleString()}<br>
          <strong>Created:</strong> ${new Date(c.created_at).toLocaleString()}
        </div>
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(88, 166, 255, 0.05); border-radius: 2px;">
          <strong>Fleet Metrics:</strong><br>
          Trucks: ${c.truck_count}<br>
          Drivers: ${c.driver_count}<br>
          Active Loans: ${c.active_loans}
        </div>
        <div style="margin-bottom: 15px;">
          <strong>ISS Score:</strong> ${c.iss_score}<br>
          <strong>ISS Tier:</strong> ${c.iss_tier}
        </div>
      `;
      document.getElementById('companyContent').innerHTML = html;
    } else {
      document.getElementById('companyContent').innerHTML = '<span style="color: #f85149;">Error loading company details: ' + data.error + '</span>';
    }
  } catch (error) {
    console.error(error);
    document.getElementById('companyContent').innerHTML = '<span style="color: #f85149;">Error: ' + error.message + '</span>';
  }
}

async function confirmDeleteCompany(companyId, action) {
  closeCompanyModal();
  
  try {
    const res = await fetch(API + '/api/game/admin/delete-company', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ companyId, action })
    });

    const data = await res.json();
    
    if (res.ok) {
      showNotification(data.message, 'success');
      loadCompanies();
      loadStats();
      loadPlayers();
    } else {
      showNotification('Error: ' + data.error, 'error');
    }
  } catch (error) {
    console.error(error);
    showNotification('Error: ' + error.message, 'error');
  }
}

</script>
</body>
</html>
