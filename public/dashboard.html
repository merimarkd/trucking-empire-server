<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freight Empire - Game Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial; background: #0d1117; color: #c9d1d9; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(88,166,255,0.2); padding-bottom: 20px; }
    h1 { color: #58a6ff; }
    .user-info { text-align: right; }
    .user-info p { color: #8b949e; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
    .card { background: rgba(31, 111, 235, 0.1); border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 8px; padding: 20px; }
    .card h3 { color: #58a6ff; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
    .card .value { font-size: 2rem; font-weight: bold; }
    .card .subtext { color: #8b949e; font-size: 0.85rem; margin-top: 5px; }
    .section { margin-bottom: 40px; }
    .section h2 { color: #58a6ff; margin-bottom: 15px; font-size: 1.3rem; }
    .loans-list { background: rgba(13, 17, 23, 0.5); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 8px; }
    .loan-item { padding: 15px; border-bottom: 1px solid rgba(88, 166, 255, 0.1); }
    .loan-item:last-child { border-bottom: none; }
    .loan-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .loan-amount { color: #58a6ff; font-weight: bold; }
    .loan-status { color: #8b949e; font-size: 0.85rem; }
    .empty { color: #8b949e; font-style: italic; padding: 20px; text-align: center; }
    .button-group { display: flex; gap: 10px; }
    button { background: #1f6feb; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #388bfd; }
    button.secondary { background: rgba(88, 166, 255, 0.1); color: #58a6ff; border: 1px solid rgba(88, 166, 255, 0.3); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1 id="companyName">Loading...</h1>
      <p id="companyDot" style="color: #8b949e; font-size: 0.9rem;"></p>
    </div>
    <div class="user-info">
      <p id="ownerName">-</p>
      <p>Credit Score: <span id="creditScore">-</span></p>
      <div class="button-group" style="margin-top: 10px; justify-content: flex-end;">
        <button class="secondary" onclick="window.location.href='/'">Logout</button>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Cash</h3>
      <div class="value" id="cashValue">$0</div>
    </div>
    <div class="card">
      <h3>Trucks</h3>
      <div class="value" id="truckCount">0</div>
      <div class="subtext">Fleet size</div>
    </div>
    <div class="card">
      <h3>Drivers</h3>
      <div class="value" id="driverCount">0</div>
      <div class="subtext">Employees</div>
    </div>
    <div class="card">
      <h3>Active Loans</h3>
      <div class="value" id="loanCount">0</div>
      <div class="subtext">Outstanding</div>
    </div>
  </div>

  <div class="section">
    <h2>Active Loans</h2>
    <div class="loans-list" id="loansList">
      <div class="empty">Loading loans...</div>
    </div>
  </div>

  <div class="section">
    <h2>Quick Actions</h2>
    <div class="button-group">
      <button onclick="alert('Load Board coming soon')">Browse Loads</button>
      <button onclick="alert('Fleet Management coming soon')">Manage Fleet</button>
      <button onclick="alert('Driver Hiring coming soon')">Hire Drivers</button>
      <button onclick="alert('Loans coming soon')">Apply for Loan</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://143.198.176.234:5000';
  const token = localStorage.getItem('authToken');

  if (!token) {
    window.location.href = '/';
  }

  async function loadDashboard() {
    try {
      // Get player info to find company ID
      const playerRes = await fetch(API + '/api/auth/admin/players');
      const players = await playerRes.json();
      const currentPlayer = players.find(p => p.username === 'bobandtom'); // This is hardcoded for now
      
      if (!currentPlayer || !currentPlayer.current_company_id) {
        document.body.innerHTML = '<p style="padding: 20px; color: red;">No company found</p>';
        return;
      }

      // Get company data
      const companyRes = await fetch(API + '/api/game/company/' + currentPlayer.current_company_id);
      const data = await companyRes.json();
      
      document.getElementById('companyName').textContent = data.company.name;
      document.getElementById('companyDot').textContent = 'DOT: ' + data.company.dot_number;
      document.getElementById('ownerName').textContent = data.owner.username;
      document.getElementById('creditScore').textContent = data.owner.personal_credit_score;
      document.getElementById('cashValue').textContent = '$' + parseFloat(data.company.cash).toLocaleString();
      document.getElementById('truckCount').textContent = data.truckCount;
      document.getElementById('driverCount').textContent = data.driverCount;
      document.getElementById('loanCount').textContent = data.loans.length;

      // Render loans
      if (data.loans.length === 0) {
        document.getElementById('loansList').innerHTML = '<div class="empty">No active loans</div>';
      } else {
        const loansHtml = data.loans.map(loan => `
          <div class="loan-item">
            <div class="loan-header">
              <span>Loan #${loan.id.substring(0, 8)}</span>
              <span class="loan-amount">$${parseFloat(loan.principal).toLocaleString()}</span>
            </div>
            <div class="loan-status">Rate: ${loan.interest_rate}% | Status: ${loan.status}</div>
          </div>
        `).join('');
        document.getElementById('loansList').innerHTML = loansHtml;
      }
    } catch (error) {
      console.error(error);
      document.body.innerHTML = '<p style="padding: 20px; color: red;">Error loading dashboard</p>';
    }
  }

  loadDashboard();
</script>
</body>
</html>
